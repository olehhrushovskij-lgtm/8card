<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для тебе ♡</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


    
/* Ефект трясіння сторінки при кліку */
.shake-it {
  animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Іскри (Cursor Trail) */
.cursor-sparkle {
  position: fixed;
  pointer-events: none;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  z-index: 100;
  box-shadow: 0 0 10px #ffc0cb;
}

    :root {
      --rose:    #d84f6e;
      --rose-lt: #f09aad;
      --rose-dk: #a02848;
      --cream:   #fdf6f0;
      --ink:     #2d1a22;
      --muted:   #5a3545;
      --accent:  #e8829a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--cream);
      overflow: hidden;
    }

    /* ─── Canvas layer ─── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Particle canvas ─── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ─── Content ─── */
    .scene {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 3rem;
      gap: 0;
    }

    /* ─── Big heart ─── */
    .heart-wrap {
      position: relative;
      width: 160px;
      height: 150px;
      margin-bottom: 2rem;
      cursor: pointer;
    }

    .heart-wrap svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 40px rgba(200,60,80,.35));
      transition: filter .3s;
    }

    .heart-wrap:hover svg {
      filter: drop-shadow(0 14px 50px rgba(200,60,80,.55));
    }

    #mainHeart {
      transform-origin: 50% 58%;
      animation: heartbeat 1.6s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.15); }
      28%      { transform: scale(1.05); }
      42%      { transform: scale(1.18); }
      70%      { transform: scale(1); }
    }

    /* ─── Ripple rings on click ─── */
    .ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid var(--rose);
      transform: translate(-50%,-50%) scale(0);
      opacity: 1;
      pointer-events: none;
      animation: ring-out .9s ease-out forwards;
    }

    @keyframes ring-out {
      to { transform: translate(-50%,-50%) scale(16); opacity: 0; }
    }

    /* ─── Text ─── */
    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: .28em;
      color: var(--accent);
      text-transform: lowercase;
      margin-bottom: .8rem;
      opacity: 0;
      animation: fadeUp .8s .25s ease both;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(2.3rem, 6vw, 3.8rem);
      line-height: 1.18;
      color: var(--ink);
      text-align: center;
      margin-bottom: .6rem;
      opacity: 0;
      animation: fadeUp .9s .4s ease both;
    }

    .headline em {
      font-style: italic;
      background: linear-gradient(110deg, #c8647a 0%, #f09aad 45%, #c8647a 100%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.8s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 0% center; }
      to   { background-position: 220% center; }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0 1.7rem;
      opacity: 0;
      animation: fadeUp 1s .6s ease both;
    }

    .divider-line {
      width: 55px; height: 1px;
      background: linear-gradient(90deg, transparent, #d88095);
    }

    .divider-line.r { background: linear-gradient(90deg, #d88095, transparent); }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: #d88095; }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.6vw, 1.35rem);
      line-height: 1.9;
      color: var(--muted);
      text-align: center;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 1s .8s ease both;
    }

    .sig {
      margin-top: 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 1s 1.1s ease both;
    }

    .sig-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: .22em;
      color: #b07080;
      text-transform: lowercase;
    }

    .mini-hearts { display: flex; gap: 7px; }

    .mini-hearts svg {
      animation: heartbeat 1.6s ease-in-out infinite;
    }

    .mini-hearts svg:nth-child(2) { animation-delay: .25s; }
    .mini-hearts svg:nth-child(3) { animation-delay: .5s; }

    /* ─── Corner ornaments ─── */
    .corner {
      position: fixed;
      opacity: .14;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Click hint ─── */
    .hint {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      letter-spacing: .15em;
      color: #c8a0b0;
      opacity: 0;
      animation: fadeUp .8s 2s ease both, blink 2.5s 2.8s ease-in-out infinite;
      z-index: 5;
      white-space: nowrap;
    }

    @keyframes blink {
      0%,100% { opacity: .6; }
      50%      { opacity: .2; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>

<!-- Aurora gradient background -->
<canvas id="canvas"></canvas>

<!-- Floating particles -->
<canvas id="particles"></canvas>

<!-- Corner SVGs -->
<svg class="corner" style="top:0;left:0;width:160px;height:160px;" viewBox="0 0 160 160">
  <path d="M0 0 Q80 0 160 0 Q80 80 0 160Z" fill="#e8829a"/>
</svg>
<svg class="corner" style="bottom:0;right:0;width:160px;height:160px;transform:rotate(180deg);" viewBox="0 0 160 160">
  <path d="M0 0 Q80 0 160 0 Q80 80 0 160Z" fill="#e8829a"/>
</svg>

<main class="scene">

  <!-- Big beating heart -->
  <div class="heart-wrap" id="heartBtn" title="Натисни ♡">
    <svg viewBox="0 0 130 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="50%" cy="30%" r="70%">
          <stop offset="0%"   stop-color="#f5b0c0"/>
          <stop offset="50%"  stop-color="#d84f6e"/>
          <stop offset="100%" stop-color="#9a2345"/>
        </radialGradient>
        <radialGradient id="glow" cx="50%" cy="30%" r="60%">
          <stop offset="0%" stop-color="white" stop-opacity=".45"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <g id="mainHeart">
        <path d="M65 108C65 108 8 70 8 36A28 28 0 0 1 65 22A28 28 0 0 1 122 36C122 70 65 108 65 108Z"
              fill="url(#hg)"/>
        <path d="M65 108C65 108 8 70 8 36A28 28 0 0 1 65 22A28 28 0 0 1 122 36C122 70 65 108 65 108Z"
              fill="url(#glow)"/>
        <ellipse cx="43" cy="34" rx="11" ry="6.5" fill="white" opacity=".3"
                 transform="rotate(-38 43 34)"/>
      </g>
    </svg>
  </div>

  <p class="eyebrow">для тебе, моя кохана</p>

  <h1 class="headline">Ти моя<br><em>найкраща</em> частина</h1>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="divider-line r"></div>
  </div>

  <p class="message">
    Кожен день поруч із тобою — це подарунок.<br>
    Ти світлиш моє серце, як ніхто інший.<br>
    Я так тебе люблю.
  </p>

  <div class="sig">
    <span class="sig-label">завжди твій</span>
    <div class="mini-hearts">
      <svg width="18" height="16" viewBox="0 0 18 16">
        <path d="M9 14.5C9 14.5 1.5 9.5 1.5 5A3.5 3.5 0 0 1 9 3.5A3.5 3.5 0 0 1 16.5 5C16.5 9.5 9 14.5 9 14.5Z" fill="#d84f6e"/>
      </svg>
      <svg width="18" height="16" viewBox="0 0 18 16">
        <path d="M9 14.5C9 14.5 1.5 9.5 1.5 5A3.5 3.5 0 0 1 9 3.5A3.5 3.5 0 0 1 16.5 5C16.5 9.5 9 14.5 9 14.5Z" fill="#f09aad"/>
      </svg>
      <svg width="18" height="16" viewBox="0 0 18 16">
        <path d="M9 14.5C9 14.5 1.5 9.5 1.5 5A3.5 3.5 0 0 1 9 3.5A3.5 3.5 0 0 1 16.5 5C16.5 9.5 9 14.5 9 14.5Z" fill="#d84f6e"/>
      </svg>
    </div>
  </div>
</main>

<p class="hint">натисни на серце ♡</p>

<script>
/* ────────────────────────────────────────────
   1. AURORA — slow swirling gradient bg
──────────────────────────────────────────── */
(function() {
  const cv = document.getElementById('canvas');
  const ctx = cv.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function lerp(a, b, x) { return a + (b - a) * x; }

  function drawAurora() {
    ctx.clearRect(0, 0, W, H);

    // Soft blob 1
    const x1 = W * (0.3 + 0.15 * Math.sin(t * 0.3));
    const y1 = H * (0.35 + 0.1  * Math.cos(t * 0.25));
    const g1 = ctx.createRadialGradient(x1, y1, 0, x1, y1, Math.min(W,H) * 0.55);
    g1.addColorStop(0,   'rgba(232,130,154, 0.18)');
    g1.addColorStop(1,   'rgba(232,130,154, 0)');
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    // Soft blob 2
    const x2 = W * (0.7 + 0.12 * Math.cos(t * 0.22));
    const y2 = H * (0.55 + 0.12 * Math.sin(t * 0.18));
    const g2 = ctx.createRadialGradient(x2, y2, 0, x2, y2, Math.min(W,H) * 0.5);
    g2.addColorStop(0,   'rgba(216,79,110, 0.13)');
    g2.addColorStop(1,   'rgba(216,79,110, 0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);

    // Soft blob 3 (gold tint)
    const x3 = W * (0.5 + 0.2 * Math.sin(t * 0.15 + 1));
    const y3 = H * (0.2  + 0.1 * Math.cos(t * 0.2  + 2));
    const g3 = ctx.createRadialGradient(x3, y3, 0, x3, y3, Math.min(W,H) * 0.4);
    g3.addColorStop(0,   'rgba(240,180,190, 0.12)');
    g3.addColorStop(1,   'rgba(240,180,190, 0)');
    ctx.fillStyle = g3;
    ctx.fillRect(0, 0, W, H);

    t += 0.008;
    requestAnimationFrame(drawAurora);
  }
  drawAurora();
})();

/* ────────────────────────────────────────────
   2. PARTICLES — hearts & sparkles
──────────────────────────────────────────── */
(function() {
  const cv  = document.getElementById('particles');
  const ctx = cv.getContext('2d');
  let W, H;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#f09aad','#e8829a','#d84f6e','#f5bfca','#fad4dc','#c8647a'];

  function heartPath(ctx, cx, cy, r) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.3);
    ctx.bezierCurveTo( r,  -r * 1.1,  r * 1.5,  r * 0.4,  0,  r);
    ctx.bezierCurveTo(-r * 1.5, r * 0.4, -r, -r * 1.1,  0, -r * 0.3);
    ctx.closePath();
    ctx.restore();
  }

  class Particle {
    constructor(forced) {
      this.reset(forced);
    }
    reset(fromClick) {
      if (fromClick) {
        this.x = fromClick.x;
        this.y = fromClick.y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = -(3 + Math.random() * 5);
        this.life = 1;
        this.decay = 0.018 + Math.random() * 0.015;
        this.r = 5 + Math.random() * 9;
      } else {
        this.x = Math.random() * W;
        this.y = H + 20;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = -(0.5 + Math.random() * 1.4);
        this.life = 0.7 + Math.random() * 0.3;
        this.decay = 0.003 + Math.random() * 0.004;
        this.r = 4 + Math.random() * 8;
      }
      this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.type   = Math.random() > 0.35 ? 'heart' : 'sparkle';
      this.angle  = Math.random() * Math.PI * 2;
      this.spin   = (Math.random() - 0.5) * 0.06;
      this.wobble = Math.random() * Math.PI * 2;
    }

    update() {
      this.x     += this.vx;
      this.vy    += 0.018;     // gentle gravity
      this.y     += this.vy;
      this.angle += this.spin;
      this.wobble += 0.04;
      this.x     += Math.sin(this.wobble) * 0.4;
      this.life  -= this.decay;
      return this.life > 0;
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle = this.color;

      if (this.type === 'heart') {
        heartPath(ctx, 0, 0, this.r);
        ctx.fill();
      } else {
        // 4-pointed sparkle
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          const rad = (i % 2 === 0) ? this.r : this.r * 0.38;
          if (i === 0) ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad);
          else ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
        }
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }

  const ambient = [];
  for (let i = 0; i < 28; i++) {
    const p = new Particle();
    p.y = Math.random() * H;     // spread on first load
    p.life = Math.random() * 0.9;
    ambient.push(p);
  }

  const burst = [];

  window._addBurst = function(x, y) {
    for (let i = 0; i < 22; i++) burst.push(new Particle({ x, y }));
  };

  function loop() {
    ctx.clearRect(0, 0, W, H);

    // ambient
    for (let i = ambient.length - 1; i >= 0; i--) {
      const alive = ambient[i].update();
      ambient[i].draw();
      if (!alive) ambient[i].reset(false);
    }

    // burst particles
    for (let i = burst.length - 1; i >= 0; i--) {
      const alive = burst[i].update();
      burst[i].draw();
      if (!alive) burst.splice(i, 1);
    }

    requestAnimationFrame(loop);
  }
  loop();
})();

/* ────────────────────────────────────────────
   3. HEART CLICK — ripple + burst
──────────────────────────────────────────── */
const heartBtn = document.getElementById('heartBtn');

heartBtn.addEventListener('click', function(e) {
  const rect = heartBtn.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;

  // burst particles
  window._addBurst(cx, cy);

  // ripple rings
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const ring = document.createElement('div');
      ring.className = 'ring';
      ring.style.borderColor = ['#f09aad','#d84f6e','#fad4dc'][i];
      heartBtn.appendChild(ring);
      setTimeout(() => ring.remove(), 950);
    }, i * 110);
  }
});
/* 4. ДОДАТКОВІ ЕФЕКТИ */

// Трясіння екрана при натисканні
heartBtn.addEventListener('click', () => {
  document.body.classList.add('shake-it');
  setTimeout(() => document.body.classList.remove('shake-it'), 500);
});

// Ефект "іскор" за курсором
document.addEventListener('mousemove', (e) => {
  if (Math.random() > 0.85) { // Робимо іскри не за кожним рухом, а частіше
    const sparkle = document.createElement('div');
    sparkle.className = 'cursor-sparkle';
    sparkle.style.left = e.clientX + 'px';
    sparkle.style.top = e.clientY + 'px';
    document.body.appendChild(sparkle);
    
    // Анімація зникнення іскри
    sparkle.animate([
      { transform: 'scale(1) translateY(0)', opacity: 1 },
      { transform: 'scale(0) translateY(-50px)', opacity: 0 }
    ], { duration: 800, easing: 'ease-out' }).onfinish = () => sparkle.remove();
  }
});
</script>
</body>
</html>
